<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Thanh Toán Hóa Đơn</title>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Tạo Đơn Thanh Toán</h2>

      <form id="payment-form" class="space-y-4">
        <div>
          <label for="order-id" class="block text-sm font-medium text-gray-700">Mã hóa đơn / Phiếu xuất</label>
          <input type="text" id="order-id" required placeholder="VD: PXK-001" 
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>

        <div>
          <label for="amount" class="block text-sm font-medium text-gray-700">Tổng tiền (VND)</label>
          <input type="number" id="amount" required min="1000" placeholder="Nhập số tiền..." 
                 class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>

        <button type="submit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
          Tạo mã QR Chuyển khoản
        </button>
      </form>

      <div id="qr-section" class="mt-8 hidden flex-col items-center border-t border-gray-200 pt-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Quét mã để thanh toán</h3>
        
        <div class="bg-gray-50 border border-gray-100 p-4 rounded-lg w-full mb-4 text-center text-sm text-gray-700">
          <p>Số tiền: <strong id="display-amount" class="text-red-600 text-xl font-bold">0</strong><strong> VND</strong></p>
          <p class="mt-2">Lời nhắn: <span id="display-message" class="font-medium text-gray-900 px-2 py-1 bg-gray-200 rounded">...</span></p>
        </div>

        <div class="relative inline-block w-full max-w-[250px] aspect-square flex justify-center items-center">
          <div id="qr-loading" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-90 hidden z-10">
            <span class="text-sm text-blue-600 font-medium animate-pulse">Đang khởi tạo mã...</span>
          </div>
          <img id="qr-image" src="" alt="Mã QR Thanh toán" class="rounded-lg shadow-md w-full h-full object-contain hidden" />
        </div>

        <p class="text-xs text-gray-500 mt-4 text-center">
          Sử dụng App Ngân hàng bất kỳ hỗ trợ VietQR để quét mã.
        </p>
      </div>
    </div>

    <script>
      // 1. Cấu hình hằng số (Constants) - Đặt ở đầu để dễ thay đổi
      const BANK_CONFIG = {
        ID: "MB",
        ACCOUNT_NO: "551789999",
        ACCOUNT_NAME: "NGUYEN HONG PHUONG NGHI"
      };

      // 2. Định danh và lưu trữ các DOM Elements
      const form = document.getElementById('payment-form');
      const qrSection = document.getElementById('qr-section');
      const qrImage = document.getElementById('qr-image');
      const displayAmount = document.getElementById('display-amount');
      const displayMessage = document.getElementById('display-message');
      const qrLoading = document.getElementById('qr-loading');

      // 3. Quản lý sự kiện (Event Listeners)
      form.addEventListener('submit', function(event) {
        event.preventDefault(); // Chặn hành vi tải lại trang mặc định của form

        // Lấy dữ liệu và làm sạch (trim) khoảng trắng thừa
        const orderId = document.getElementById('order-id').value.trim();
        const amount = parseInt(document.getElementById('amount').value, 10);

        if (orderId && amount > 0) {
          generatePaymentQR(amount, orderId);
        }
      });

      // 4. Logic cốt lõi: Tạo và xử lý UI mã QR
      function generatePaymentQR(amount, orderId) {
        // Chuẩn hóa nội dung chuyển khoản: Không dấu, viết hoa để tương thích 100% các app ngân hàng
        const rawMessage = `Thanh toan don ${orderId}`;
        const cleanMessage = rawMessage.toUpperCase();
        
        // Kích hoạt UI hiển thị QR và màn hình loading
        qrSection.classList.remove('hidden');
        qrSection.classList.add('flex');
        qrImage.classList.add('hidden'); // Tạm ẩn ảnh cũ nếu có
        qrLoading.classList.remove('hidden');
        
        // Cập nhật text hiển thị cho người dùng kiểm tra lại
        displayAmount.innerText = amount.toLocaleString('vi-VN');
        displayMessage.innerText = cleanMessage;

        // Xây dựng URL gọi API (Dùng encodeURIComponent để an toàn hóa chuỗi string trên URL)
        const qrUrl = `https://img.vietqr.io/image/${BANK_CONFIG.ID}-${BANK_CONFIG.ACCOUNT_NO}-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(cleanMessage)}&accountName=${encodeURIComponent(BANK_CONFIG.ACCOUNT_NAME)}`;

        // Xử lý luồng tải ảnh bất đồng bộ (Asynchronous Image Loading)
        qrImage.onload = () => {
          qrLoading.classList.add('hidden'); // Tắt loading
          qrImage.classList.remove('hidden'); // Hiện ảnh thật
        };
        
        qrImage.onerror = () => {
          qrLoading.classList.add('hidden');
          alert('Không thể kết nối đến máy chủ tạo mã QR. Vui lòng kiểm tra mạng và thử lại.');
        };
        
        // Bắt đầu tiến trình tải ảnh từ URL
        qrImage.src = qrUrl;
      }
    </script>
  </body>
</html>
