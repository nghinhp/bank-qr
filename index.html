<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THANH TOÁN NHANH</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --text-size: 18px; /* Chữ to cho dễ đọc */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; padding: 15px; max-width: 600px; margin: 0 auto; 
            background-color: #f0f2f5; color: #333;
            line-height: 1.5;
        }

        /* Chặn auto zoom trên Safari bằng cách ép font >= 16px */
        input, select, button { font-size: 16px !important; }

        h2 { font-size: 24px; margin-bottom: 20px; color: #000; }

        /* Tabs Chọn chế độ */
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { 
            flex: 1; padding: 15px; border: 2px solid var(--primary-color); 
            background: white; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .mode-btn.active { background: var(--primary-color); color: white; }

        #reader { 
            width: 100%; border-radius: 15px; overflow: hidden; 
            border: 3px solid #ccc; background: #000; margin-bottom: 15px;
        }

        .container { 
            display: none; background: white; padding: 25px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: left;
        }

        .section-title { 
            font-size: 20px; color: var(--primary-color); 
            border-bottom: 3px solid var(--primary-color); 
            padding-bottom: 8px; margin: 25px 0 15px 0; font-weight: 900;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; font-weight: bold; margin-bottom: 8px; 
            font-size: 16px; color: #555;
        }

        input, select { 
            width: 100%; padding: 15px; border: 2px solid #ddd; 
            border-radius: 12px; box-sizing: border-box; 
            background: #fff; display: block;
        }

        input[readonly] { background-color: #f8f9fa; border-color: #eee; color: #666; }

        /* Nút bấm khổng lồ */
        .btn-main { 
            width: 100%; padding: 20px; background: var(--primary-color); 
            color: white; border: none; border-radius: 15px; 
            font-size: 20px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
            margin-top: 10px;
        }
        .btn-main:active { transform: scale(0.98); }
        .btn-success { background: var(--success-color); box-shadow: 0 5px 15px rgba(40,167,69,0.3); }
        
        .btn-secondary { 
            width: 100%; padding: 15px; background: none; 
            color: var(--danger-color); border: none; font-size: 16px; 
            font-weight: bold; margin-top: 15px; cursor: pointer;
        }

        #loadingOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
        }

        #finalQrImg { width: 100%; max-width: 300px; display: block; margin: 0 auto; border: 5px solid #eee; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loadingOverlay" style="display:none;">⏳ ĐANG TẢI...</div>

    <h2>KẾ TOÁN & THANH TOÁN</h2>

    <div class="mode-selector">
        <button id="btnScanMode" class="mode-btn active" onclick="switchMode('scan')">📸 QUÉT MÃ</button>
        <button id="btnManualMode" class="mode-btn" onclick="switchMode('manual')">⌨️ NHẬP TAY</button>
    </div>
    
    <div id="scan-section">
        <div id="reader"></div>
        <p id="statusMsg" style="font-weight:bold; font-size:18px;">Vui lòng đưa camera vào mã QR</p>
    </div>

    <div id="form-container" class="container">
        <h3 class="section-title">1. TIỀN & APP</h3>
        
        <div class="form-group">
            <label>Số tiền chuyển (VNĐ):</label>
            <input type="number" id="amount" placeholder="Ví dụ: 500000" inputmode="numeric">
        </div>

        <div class="form-group">
            <label>Nội dung chuyển (Tạo QR):</label>
            <input type="text" id="transferMemo" placeholder="Ghi chú chuyển tiền">
        </div>

        <div class="form-group" id="manual-bank-info" style="display:none;">
            <label>Số tài khoản người nhận:</label>
            <input type="text" id="accNo" placeholder="Nhập số tài khoản">
            <label style="margin-top:10px;">Mã Ngân hàng (BIN):</label>
            <input type="text" id="bankId" placeholder="Ví dụ: 970436">
        </div>

        <div class="form-group">
            <label>Chọn App Ngân hàng của bác:</label>
            <select id="appSelect">
                <option value="vcbdigibank://">Vietcombank</option>
                <option value="momo://">MoMo</option>
                <option value="zalopay://">ZaloPay</option>
                <option value="mbmobile://">MB Bank</option>
                <option value="tcbmobile://">Techcombank</option>
                <option value="tpb-android-app://">TPBank</option>
                <option value="none">Chỉ lưu - Không mở app</option>
            </select>
        </div>

        <h3 class="section-title">2. HẠCH TOÁN</h3>
        
        <div class="form-group">
            <label>Người bán (Vendor):</label>
            <select id="vendorSelect" onchange="updateAccountingMemo()"></select>
        </div>
        
        <div class="form-group">
            <label>Đơn vị (Unit):</label>
            <select id="unitSelect" onchange="updateAccountingMemo()"></select>
        </div>
        
        <div class="form-group">
            <label>Hạng mục (Category):</label>
            <select id="categorySelect" onchange="updateAccountingMemo()"></select>
        </div>

        <div class="form-group">
            <label>Mã hạch toán nội bộ:</label>
            <input type="text" id="accountingMemo" readonly>
        </div>

        <button class="btn-main" id="btnAction" onclick="processAll()">LƯU & TẠO QR</button>
        <button class="btn-secondary" onclick="location.reload()">HỦY & LÀM LẠI</button>
    </div>

    <div id="result-container" class="container">
        <h3 style="text-align: center; color: var(--success-color);">XONG! BÁC LÀM THEO BƯỚC:</h3>
        
        <div style="background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold;">
            1. Đè tay vào hình QR chọn "Lưu ảnh"<br>
            2. Bấm nút xanh để mở App ngân hàng<br>
            3. Trong App chọn "Quét mã" -> chọn Ảnh vừa lưu.
        </div>

        <img id="finalQrImg" src="">

        <button class="btn-main btn-success" onclick="openBankApp()">🚀 MỞ APP NGÂN HÀNG</button>
        <button class="btn-secondary" onclick="location.reload()">QUAY LẠI QUÉT MỚI</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyRFQKeSYOQc4SiB2XNAn-DxILnfh3qvKBtRZoJbnPVDvb3NGibqE33Hh3Xf9aHd-Gv/exec"; // Thay link GAS của bác vào đây
        
        let html5QrcodeScanner;
        let currentAppScheme = "none";
        let rawQrText = "MANUAL_INPUT";

        // Khởi tạo lấy data
        window.onload = function() {
            loadCategories();
            initScanner();
        };

        function switchMode(mode) {
            document.getElementById('btnScanMode').className = 'mode-btn ' + (mode === 'scan' ? 'active' : '');
            document.getElementById('btnManualMode').className = 'mode-btn ' + (mode === 'manual' ? 'active' : '');
            
            if (mode === 'manual') {
                if (html5QrcodeScanner) html5QrcodeScanner.clear();
                document.getElementById('scan-section').style.display = 'none';
                document.getElementById('form-container').style.display = 'block';
                document.getElementById('manual-bank-info').style.display = 'block';
                document.getElementById('accNo').readOnly = false;
                document.getElementById('bankId').readOnly = false;
            } else {
                location.reload();
            }
        }

        function initScanner() {
            // ÉP CAMERA SAU (facingMode: environment)
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: {width: 280, height: 280},
                videoConstraints: { facingMode: "environment" } 
            }, false);
            html5QrcodeScanner.render(onScanSuccess);
        }

        function loadCategories() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            fetch(GAS_URL)
                .then(r => r.json())
                .then(data => {
                    fill('vendorSelect', data.vendors);
                    fill('unitSelect', data.units);
                    fill('categorySelect', data.categories);
                    updateAccountingMemo();
                    document.getElementById('loadingOverlay').style.display = 'none';
                })
                .catch(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                });
        }

        function fill(id, list) {
            let s = document.getElementById(id);
            s.innerHTML = '<option value="">-- Chọn --</option>';
            list.forEach(i => s.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function onScanSuccess(text) {
            html5QrcodeScanner.clear();
            rawQrText = text;
            let info = parseVietQR(text);
            
            document.getElementById('bankId').value = info.bankId;
            document.getElementById('accNo').value = info.accountNo;
            document.getElementById('amount').value = info.amount;
            document.getElementById('transferMemo').value = info.message || "";
            
            document.getElementById('scan-section').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            updateAccountingMemo();
        }

        function parseVietQR(str) {
            function tlv(s) {
                let t = {}; let i = 0;
                while (i < s.length) {
                    let id = s.substr(i, 2), len = parseInt(s.substr(i + 2, 2)), val = s.substr(i + 4, len);
                    t[id] = val; i += 4 + len;
                } return t;
            }
            try {
                let root = tlv(str);
                let res = { bankId: "", accountNo: "", amount: root["54"] || "", message: "" };
                if (root["38"]) {
                    let m = tlv(root["38"]);
                    if (m["01"]) {
                        let b = tlv(m["01"]);
                        res.bankId = b["00"]; res.accountNo = b["01"];
                    }
                }
                if (root["62"]) {
                    let a = tlv(root["62"]);
                    res.message = a["08"];
                }
                return res;
            } catch (e) { return {}; }
        }

        function updateAccountingMemo() {
            let v = document.getElementById('vendorSelect').value || "V";
            let u = document.getElementById('unitSelect').value || "U";
            let c = document.getElementById('categorySelect').value || "C";
            let d = new Date();
            let date = d.getFullYear().toString().slice(-2) + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
            document.getElementById('accountingMemo').value = `${v}_${u}_${c}_${date}`;
        }

        function processAll() {
            let btn = document.getElementById('btnAction');
            btn.innerText = "ĐANG LƯU...";
            btn.disabled = true;

            let data = {
                bankId: document.getElementById('bankId').value,
                accountNo: document.getElementById('accNo').value,
                amount: document.getElementById('amount').value,
                transferMemo: document.getElementById('transferMemo').value,
                vendor: document.getElementById('vendorSelect').value,
                unit: document.getElementById('unitSelect').value,
                category: document.getElementById('categorySelect').value,
                accountingMemo: document.getElementById('accountingMemo').value,
                rawText: rawQrText
            };

            currentAppScheme = document.getElementById('appSelect').value;

            // Gửi GAS ngầm
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });

            // Tạo QR
            let qrUrl = `https://img.vietqr.io/image/${data.bankId}-${data.accountNo}-compact2.png?amount=${data.amount}&addInfo=${encodeURIComponent(data.transferMemo)}`;
            document.getElementById('finalQrImg').src = qrUrl;
            
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
        }

        function openBankApp() {
            if (currentAppScheme !== "none") window.location.href = currentAppScheme;
        }
    </script>
</body>
</html>
