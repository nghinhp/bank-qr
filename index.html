<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner to Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; max-width: 600px; margin: 0 auto; }
        #reader { width: 100%; margin-bottom: 20px; }
        .info-box { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        .info-box p { margin: 5px 0; font-size: 15px; }
        strong { color: #0056b3; }
    </style>
</head>
<body>

    <h2>Quét Mã QR Ngân Hàng</h2>
    <div id="reader"></div>
    <div id="result">
        <div class="info-box" id="parsedData">
            <p><strong>Ngân hàng (BIN):</strong> <span id="bankId">-</span></p>
            <p><strong>Số tài khoản:</strong> <span id="accNo">-</span></p>
            <p><strong>Số tiền:</strong> <span id="amount">-</span></p>
            <p><strong>Nội dung:</strong> <span id="msg">-</span></p>
        </div>
        <p id="statusMsg">Sẵn sàng quét...</p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyRFQKeSYOQc4SiB2XNAn-DxILnfh3qvKBtRZoJbnPVDvb3NGibqE33Hh3Xf9aHd-Gv/exec"; // Dán link Web App mới của bạn vào đây

        // Hàm bóc tách dữ liệu theo chuẩn TLV của VietQR
        function parseVietQR(qrString) {
            function parseTLV(str) {
                let tags = {};
                let i = 0;
                while (i < str.length) {
                    let id = str.substr(i, 2);
                    let len = parseInt(str.substr(i + 2, 2));
                    let val = str.substr(i + 4, len);
                    tags[id] = val;
                    i += 4 + len;
                }
                return tags;
            }

            try {
                let rootTags = parseTLV(qrString);
                let result = { bankId: "", accountNo: "", amount: "", message: "", rawText: qrString };

                // Tag 38 chứa thông tin định danh người thụ hưởng
                if (rootTags["38"]) {
                    let merchantInfo = parseTLV(rootTags["38"]);
                    if (merchantInfo["01"]) {
                        let beneficiary = parseTLV(merchantInfo["01"]);
                        result.bankId = beneficiary["00"] || ""; 
                        result.accountNo = beneficiary["01"] || ""; 
                    }
                }
                // Tag 54 chứa số tiền
                if (rootTags["54"]) result.amount = rootTags["54"];
                // Tag 62 chứa nội dung bổ sung
                if (rootTags["62"]) {
                    let additionalData = parseTLV(rootTags["62"]);
                    if (additionalData["08"]) result.message = additionalData["08"];
                }
                return result;
            } catch (e) {
                console.error("Lỗi parse QR:", e);
                return { rawText: qrString };
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.pause();
            
            // Bóc tách dữ liệu
            let parsedInfo = parseVietQR(decodedText);
            
            // Hiển thị lên màn hình
            document.getElementById('bankId').innerText = parsedInfo.bankId || "Không có";
            document.getElementById('accNo').innerText = parsedInfo.accountNo || "Không có";
            document.getElementById('amount').innerText = parsedInfo.amount ? Number(parsedInfo.amount).toLocaleString('vi-VN') + " đ" : "Không có";
            document.getElementById('msg').innerText = parsedInfo.message || "Không có";
            document.getElementById('statusMsg').innerText = "Đang lưu vào hệ thống...";

            // Gửi lên Google Sheets
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(parsedInfo)
            })
            .then(() => {
                document.getElementById('statusMsg').innerText = "✅ Đã lưu dữ liệu thành công!";
                setTimeout(() => {
                    document.getElementById('statusMsg').innerText = "Tiếp tục quét...";
                    html5QrcodeScanner.resume();
                }, 3000);
            })
            .catch(err => {
                document.getElementById('statusMsg').innerText = "❌ Lỗi kết nối. Vui lòng thử lại.";
                html5QrcodeScanner.resume();
            });
        }

        html5QrcodeScanner.render(onScanSuccess, () => {});
    </script>
</body>
</html>
