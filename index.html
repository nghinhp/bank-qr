<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THANH TOÁN SIÊU TỐC</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #0066ff;
            --bg-color: #ffffff;
            --input-bg: #f9f9f9;
        }

        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; padding: 10px; margin: 0; background-color: #f0f2f5; 
            -webkit-font-smoothing: antialiased;
        }

        /* Nới rộng toàn màn hình */
        .main-wrapper { max-width: 100%; margin: 0 auto; width: 96%; }

        h2 { font-size: 28px; font-weight: 800; margin: 20px 0; color: #1a1a1a; }

        /* Mode Selector to bự */
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { 
            flex: 1; padding: 20px 10px; border: 3px solid var(--primary-color); 
            background: white; border-radius: 16px; font-weight: 900; font-size: 18px;
        }
        .mode-btn.active { background: var(--primary-color); color: white; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .container { 
            display: none; background: white; padding: 25px 20px; 
            border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: left;
        }

        .section-title { 
            font-size: 22px; color: var(--primary-color); border-left: 6px solid var(--primary-color);
            padding-left: 15px; margin: 30px 0 20px 0; font-weight: 800; text-transform: uppercase;
        }

        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; font-weight: 800; margin-bottom: 12px; 
            font-size: 18px; color: #333;
        }

        /* Input & Select siêu to cho người già */
        input, select { 
            width: 100%; padding: 22px 15px; border: 3px solid #e0e0e0; 
            border-radius: 18px; box-sizing: border-box; background: var(--input-bg);
            font-size: 20px !important; /* Font cực to để Safari không zoom */
            font-weight: 600; color: #000;
        }
        input:focus, select:focus { border-color: var(--primary-color); outline: none; background: #fff; }
        
        /* Hiển thị số tiền lớn, đỏ đậm cho dễ nhìn */
        #amountDisplay {
            font-size: 32px; font-weight: 900; color: #d32f2f; 
            text-align: right; margin-top: 10px; display: block;
        }

        .btn-main { 
            width: 100%; padding: 25px; background: var(--primary-color); 
            color: white; border: none; border-radius: 20px; 
            font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,102,255,0.4); margin-top: 15px;
        }
        .btn-success { background: #2e7d32; box-shadow: 0 8px 20px rgba(46,125,50,0.4); }

        #loadingOverlay { 
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid var(--primary-color); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay"><div class="spinner"></div><p style="margin-top:20px; font-weight:900;">ĐANG XỬ LÝ...</p></div>

    <div class="main-wrapper">
        <h2>QUÉT & THANH TOÁN</h2>

        <div class="mode-selector">
            <button id="btnScanMode" class="mode-btn active" onclick="switchMode('scan')">📸 QUÉT QR</button>
            <button id="btnManualMode" class="mode-btn" onclick="switchMode('manual')">⌨️ NHẬP TAY</button>
        </div>
        
        <div id="scan-section">
            <div id="reader"></div>
            <p style="font-weight:900; font-size:20px; margin-top:20px;">👇 Đưa camera vào mã QR</p>
        </div>

        <div id="form-container" class="container">
            <h3 class="section-title">1. TIỀN & NGÂN HÀNG</h3>
            
            <div class="form-group">
                <label>Số tiền muốn chuyển (VNĐ):</label>
                <input type="text" id="amountInput" placeholder="0" inputmode="numeric" oninput="handleAmountInput(this)">
                <span id="amountDisplay">0 đ</span>
            </div>

            <div class="form-group">
                <label>Nội dung ghi trên QR:</label>
                <input type="text" id="transferMemo" placeholder="Ghi chú">
            </div>

            <div id="manual-bank-info" style="display:none;">
                <div class="form-group">
                    <label>Số tài khoản nhận:</label>
                    <input type="text" id="accNo" placeholder="Nhập số tài khoản">
                </div>
                <div class="form-group">
                    <label>Mã Ngân hàng (BIN):</label>
                    <input type="text" id="bankId" placeholder="Ví dụ: 970436">
                </div>
            </div>

            <div class="form-group">
                <label>Mở App Ngân hàng của bác:</label>
                <select id="appSelect">
                    <option value="vcbdigibank://">Vietcombank</option>
                    <option value="momo://">MoMo</option>
                    <option value="zalopay://">ZaloPay</option>
                    <option value="mbmobile://">MB Bank</option>
                    <option value="techcombank://">Techcombank</option>
                    <option value="none">Không mở app</option>
                </select>
            </div>

            <h3 class="section-title">2. HẠCH TOÁN CHI PHÍ</h3>
            
            <div class="form-group">
                <label>Người bán (Vendor):</label>
                <select id="vendorSelect" onchange="updateAccountingMemo()"></select>
            </div>
            
            <div class="form-group">
                <label>Đơn vị (Unit):</label>
                <select id="unitSelect" onchange="updateAccountingMemo()"></select>
            </div>
            
            <div class="form-group">
                <label>Hạng mục (Category):</label>
                <select id="categorySelect" onchange="updateAccountingMemo()"></select>
            </div>

            <div class="form-group">
                <label>Mã hạch toán nội bộ:</label>
                <input type="text" id="accountingMemo" readonly>
            </div>

            <button class="btn-main" id="btnAction" onclick="processAll()">LƯU & TẠO QR</button>
            <button style="width:100%; background:none; border:none; color:#666; font-size:18px; font-weight:bold; margin-top:20px;" onclick="location.reload()">HỦY LÀM LẠI</button>
        </div>

        <div id="result-container" class="container" style="text-align:center;">
            <h3 style="color: var(--success-color); font-size: 26px;">XONG RỒI BÁC ƠI!</h3>
            <div style="background: #fff3cd; padding: 20px; border-radius: 15px; text-align: left; font-size: 18px; font-weight: bold; border: 2px solid #ffeeba;">
                1. Đè tay vào QR chọn <b>"Lưu ảnh"</b><br>
                2. Bấm nút xanh mở App Bank<br>
                3. Trong App chọn <b>"Quét QR"</b> -> chọn <b>Ảnh</b> vừa lưu.
            </div>

            <img id="finalQrImg" src="" style="width:100%; max-width:320px; margin: 25px auto; border: 8px solid #f0f0f0; border-radius: 20px;">

            <button class="btn-main btn-success" onclick="openBankApp()">🚀 MỞ APP NGÂN HÀNG</button>
            <button style="width:100%; background:none; border:none; color:#666; font-size:18px; font-weight:bold; margin-top:25px;" onclick="location.reload()">QUÉT MÃ MỚI</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyRFQKeSYOQc4SiB2XNAn-DxILnfh3qvKBtRZoJbnPVDvb3NGibqE33Hh3Xf9aHd-Gv/exec"; // Thay link của bác vào
        let html5QrcodeScanner;
        let currentAppScheme = "none";
        let rawQrText = "MANUAL";

        // --- LOGIC ĐỊNH DẠNG TIỀN ---
        function formatNumber(n) {
            return n.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function handleAmountInput(input) {
            let val = input.value.replace(/\D/g, ""); // Chỉ lấy số
            input.value = formatNumber(val); // Hiển thị có dấu phẩy trong ô nhập
            document.getElementById('amountDisplay').innerText = (val ? formatNumber(val) : "0") + " đ";
        }

        window.onload = function() {
            loadCategories();
            initScanner();
        };

        function switchMode(mode) {
            if (mode === 'manual') {
                if (html5QrcodeScanner) html5QrcodeScanner.clear();
                document.getElementById('scan-section').style.display = 'none';
                document.getElementById('form-container').style.display = 'block';
                document.getElementById('manual-bank-info').style.display = 'block';
            } else { location.reload(); }
        }

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, qrbox: {width: 280, height: 280},
                videoConstraints: { facingMode: "environment" } 
            });
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(text) {
            html5QrcodeScanner.clear();
            rawQrText = text;
            let info = parseVietQR(text);
            document.getElementById('bankId').value = info.bankId;
            document.getElementById('accNo').value = info.accountNo;
            
            // Điền tiền nếu trong QR có sẵn
            if(info.amount) {
                document.getElementById('amountInput').value = formatNumber(info.amount);
                document.getElementById('amountDisplay').innerText = formatNumber(info.amount) + " đ";
            }
            
            document.getElementById('transferMemo').value = info.message || "";
            document.getElementById('scan-section').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            updateAccountingMemo();
        }

        function loadCategories() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            fetch(GAS_URL).then(r => r.json()).then(data => {
                fill('vendorSelect', data.vendors);
                fill('unitSelect', data.units);
                fill('categorySelect', data.categories);
                updateAccountingMemo();
                document.getElementById('loadingOverlay').style.display = 'none';
            }).catch(() => document.getElementById('loadingOverlay').style.display = 'none');
        }

        function fill(id, list) {
            let s = document.getElementById(id);
            s.innerHTML = '<option value="">-- CHỌN --</option>';
            list.forEach(i => s.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function updateAccountingMemo() {
            let v = document.getElementById('vendorSelect').value || "V";
            let u = document.getElementById('unitSelect').value || "U";
            let c = document.getElementById('categorySelect').value || "C";
            let d = new Date();
            let date = d.getFullYear().toString().slice(-2) + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
            document.getElementById('accountingMemo').value = `${v}_${u}_${c}_${date}`;
        }

        function processAll() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // Lấy giá trị số (bỏ dấu phẩy)
            let rawAmount = document.getElementById('amountInput').value.replace(/\D/g, "");

            let data = {
                bankId: document.getElementById('bankId').value,
                accountNo: document.getElementById('accNo').value,
                amount: rawAmount,
                transferMemo: document.getElementById('transferMemo').value,
                vendor: document.getElementById('vendorSelect').value,
                unit: document.getElementById('unitSelect').value,
                category: document.getElementById('categorySelect').value,
                accountingMemo: document.getElementById('accountingMemo').value,
                rawText: rawQrText
            };

            currentAppScheme = document.getElementById('appSelect').value;
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });

            let qrUrl = `https://img.vietqr.io/image/${data.bankId}-${data.accountNo}-compact2.png?amount=${data.amount}&addInfo=${encodeURIComponent(data.transferMemo)}`;
            
            let img = new Image();
            img.onload = () => {
                document.getElementById('finalQrImg').src = qrUrl;
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('loadingOverlay').style.display = 'none';
            };
            img.src = qrUrl;
        }

        function openBankApp() { if (currentAppScheme !== "none") window.location.href = currentAppScheme; }

        function parseVietQR(str) {
            function tlv(s) {
                let t = {}; let i = 0;
                while (i < s.length) {
                    let id = s.substr(i, 2), len = parseInt(s.substr(i + 2, 2)), val = s.substr(i + 4, len);
                    t[id] = val; i += 4 + len;
                } return t;
            }
            try {
                let root = tlv(str);
                let res = { bankId: "", accountNo: "", amount: root["54"] || "", message: "" };
                if (root["38"]) {
                    let m = tlv(root["38"]);
                    if (m["01"]) {
                        let b = tlv(m["01"]);
                        res.bankId = b["00"]; res.accountNo = b["01"];
                    }
                }
                if (root["62"]) {
                    let a = tlv(root["62"]);
                    res.message = a["08"];
                }
                return res;
            } catch (e) { return {}; }
        }
    </script>
</body>
</html>
